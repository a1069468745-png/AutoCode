spring:
  application:
    name: dev-agent-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:autocode}
    username: ${DB_USERNAME:autocode}
    password: ${DB_PASSWORD:replace_me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:replace_me}
server:
  port: ${DEV_AGENT_SERVICE_PORT:18087}
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    com.autocode: ${APP_LOG_LEVEL:INFO}
autocode:
  context-service:
    base-url: ${CONTEXT_SERVICE_BASE_URL:http://localhost:18082}
  llm-gateway:
    base-url: ${LLM_GATEWAY_BASE_URL:http://localhost:18086}
