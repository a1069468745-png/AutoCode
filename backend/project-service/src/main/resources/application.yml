spring:
  application:
    name: project-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:autocode}
    username: ${DB_USERNAME:autocode}
    password: ${DB_PASSWORD:replace_me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:replace_me}
server:
  port: ${PROJECT_SERVICE_PORT:18081}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [%thread] %-5level %logger{36} [%X{traceId:-}] - %msg%n"
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    com.autocode: ${APP_LOG_LEVEL:INFO}
autocode:
  project:
    cache:
      detail-ttl: ${PROJECT_CACHE_DETAIL_TTL:PT30M}
      list-ttl: ${PROJECT_CACHE_LIST_TTL:PT10M}
    index:
      default-workspace-root: ${AUTOCODE_DEFAULT_WORKSPACE_ROOT:}
      excluded-directories: ${AUTOCODE_INDEX_EXCLUDED_DIRECTORIES:.git,node_modules,target,dist,.worktrees,.codex-logs}
      max-source-files: ${AUTOCODE_INDEX_MAX_SOURCE_FILES:1500}
      max-documents: ${AUTOCODE_INDEX_MAX_DOCUMENTS:400}
      max-commits: ${AUTOCODE_INDEX_MAX_COMMITS:80}
