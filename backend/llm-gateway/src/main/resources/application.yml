spring:
  application:
    name: llm-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:autocode}
    username: ${DB_USERNAME:autocode}
    password: ${DB_PASSWORD:replace_me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:replace_me}
server:
  port: ${LLM_GATEWAY_PORT:18086}
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    com.autocode: ${APP_LOG_LEVEL:INFO}
autocode:
  llm:
    provider: ${LLM_PROVIDER:openai-compatible}
    base-url: ${LLM_BASE_URL:http://localhost:11434/v1}
    api-key: ${LLM_API_KEY:replace_me}
    model-name: ${LLM_MODEL_NAME:gpt-4o-mini}
    fallback-model: ${LLM_FALLBACK_MODEL:gpt-4o-mini}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:30}
    enable-local-only: ${LLM_ENABLE_LOCAL_ONLY:false}
